<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennisholic — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--black:#07080a;--white:#f4f2ee;--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.12);--gold-border:rgba(201,168,76,0.3);--mid:#6e6b65;--card-bg:#0f1012;--card-border:rgba(255,255,255,0.08);--danger:#e05555;--success:#25D366;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;}

/* LOGIN */
.login-screen{position:fixed;inset:0;z-index:1000;background:var(–black);display:flex;align-items:center;justify-content:center;padding:1rem;}
.login-box{background:var(–card-bg);border:1px solid var(–gold-border);border-radius:20px;padding:2.5rem;width:100%;max-width:380px;text-align:center;}
.login-logo{display:flex;align-items:center;justify-content:center;gap:0.7rem;margin-bottom:2rem;}
.login-logo img{width:44px;height:44px;border-radius:50%;}
.login-logo-text{font-family:‘Playfair Display’,serif;font-size:1.4rem;font-weight:700;}
.login-logo-text em{font-style:italic;color:var(–gold);}
.login-eyebrow{font-family:‘DM Mono’,monospace;font-size:0.65rem;letter-spacing:0.25em;color:var(–gold);text-transform:uppercase;margin-bottom:1.5rem;}
.login-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(–card-border);border-radius:10px;padding:0.8rem 1rem;color:var(–white);font-family:‘Inter’,sans-serif;font-size:1rem;outline:none;transition:border 0.2s;margin-bottom:1rem;text-align:center;letter-spacing:0.2em;}
.login-input:focus{border-color:var(–gold-border);}
.login-input::placeholder{letter-spacing:0.05em;color:var(–mid);}
.login-btn{width:100%;background:var(–gold);color:var(–black);border:none;border-radius:10px;padding:0.85rem;font-family:‘Inter’,sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.login-btn:hover{background:#e0bb5a;transform:translateY(-1px);}
.login-error{color:var(–danger);font-size:0.82rem;margin-top:0.8rem;display:none;}
.login-error.show{display:block;}

/* ADMIN LAYOUT */
.admin-wrap{display:none;min-height:100vh;flex-direction:column;}
.admin-wrap.show{display:flex;}
.admin-header{background:rgba(7,8,10,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(–gold-border);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:sticky;top:0;z-index:100;}
.admin-logo{display:flex;align-items:center;gap:0.65rem;font-family:‘Playfair Display’,serif;font-size:1.2rem;font-weight:700;}
.admin-logo img{width:32px;height:32px;border-radius:50%;}
.admin-logo em{font-style:italic;color:var(–gold);}
.admin-badge{font-family:‘DM Mono’,monospace;font-size:0.6rem;letter-spacing:0.2em;background:var(–gold);color:var(–black);padding:0.2rem 0.6rem;border-radius:50px;font-weight:700;margin-left:0.3rem;}
.admin-actions{display:flex;gap:0.75rem;align-items:center;}
.btn-preview{display:flex;align-items:center;gap:0.4rem;background:transparent;border:1px solid var(–gold-border);border-radius:8px;padding:0.45rem 1rem;color:var(–gold);font-size:0.8rem;font-family:‘Inter’,sans-serif;cursor:pointer;text-decoration:none;transition:all 0.2s;}
.btn-preview:hover{background:var(–gold-dim);}
.btn-logout{background:transparent;border:1px solid var(–card-border);border-radius:8px;padding:0.45rem 1rem;color:var(–mid);font-size:0.8rem;font-family:‘Inter’,sans-serif;cursor:pointer;transition:all 0.2s;}
.btn-logout:hover{border-color:var(–danger);color:var(–danger);}

.admin-main{flex:1;padding:2.5rem;max-width:1100px;margin:0 auto;width:100%;}

/* SECTION TITLES */
.section-title{font-family:‘Playfair Display’,serif;font-size:1.4rem;font-weight:700;margin-bottom:1.5rem;display:flex;align-items:center;gap:0.75rem;}
.section-title span{font-family:‘DM Mono’,monospace;font-size:0.65rem;letter-spacing:0.2em;color:var(–gold);text-transform:uppercase;font-weight:400;}

/* TAGS SECTION */
.tags-section{background:var(–card-bg);border:1px solid var(–card-border);border-radius:14px;padding:1.5rem;margin-bottom:2.5rem;}
.tags-list{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;}
.tag-item{display:flex;align-items:center;gap:0.4rem;background:rgba(255,255,255,0.05);border:1px solid var(–card-border);border-radius:50px;padding:0.35rem 0.9rem;font-size:0.8rem;}
.tag-item.default{border-color:var(–gold-border);color:var(–gold);}
.tag-del{background:none;border:none;color:var(–mid);cursor:pointer;font-size:1rem;line-height:1;padding:0 0 0 0.2rem;transition:color 0.2s;}
.tag-del:hover{color:var(–danger);}
.tag-add-row{display:flex;gap:0.75rem;}
.tag-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(–card-border);border-radius:8px;padding:0.55rem 0.9rem;color:var(–white);font-family:‘Inter’,sans-serif;font-size:0.85rem;outline:none;transition:border 0.2s;}
.tag-input:focus{border-color:var(–gold-border);}
.btn-add-tag{background:var(–gold);color:var(–black);border:none;border-radius:8px;padding:0.55rem 1.2rem;font-family:‘Inter’,sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn-add-tag:hover{background:#e0bb5a;}

/* ADD RACKET FORM */
.add-section{background:var(–card-bg);border:1px solid var(–card-border);border-radius:14px;padding:1.5rem;margin-bottom:2.5rem;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-group{display:flex;flex-direction:column;gap:0.4rem;}
.form-group.full{grid-column:1/-1;}
.form-label{font-family:‘DM Mono’,monospace;font-size:0.65rem;letter-spacing:0.18em;color:var(–gold);text-transform:uppercase;}
.form-input,.form-select,.form-textarea{background:rgba(255,255,255,0.04);border:1px solid var(–card-border);border-radius:8px;padding:0.65rem 0.9rem;color:var(–white);font-family:‘Inter’,sans-serif;font-size:0.88rem;outline:none;transition:border 0.2s;width:100%;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(–gold-border);}
.form-select option{background:var(–black);}
.form-textarea{resize:vertical;min-height:90px;line-height:1.6;}
.img-upload-area{border:2px dashed var(–card-border);border-radius:10px;padding:2rem;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.img-upload-area:hover,.img-upload-area.drag{border-color:var(–gold-border);background:var(–gold-dim);}
.img-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.img-preview{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;display:none;}
.img-placeholder{display:flex;flex-direction:column;align-items:center;gap:0.5rem;color:var(–mid);font-size:0.85rem;}
.img-placeholder svg{opacity:0.4;}
.form-actions{display:flex;gap:0.75rem;margin-top:1.2rem;justify-content:flex-end;}
.btn-submit{background:var(–gold);color:var(–black);border:none;border-radius:10px;padding:0.7rem 1.8rem;font-family:‘Inter’,sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn-submit:hover{background:#e0bb5a;transform:translateY(-1px);}
.btn-reset{background:transparent;border:1px solid var(–card-border);color:var(–mid);border-radius:10px;padding:0.7rem 1.2rem;font-family:‘Inter’,sans-serif;font-size:0.9rem;cursor:pointer;transition:all 0.2s;}
.btn-reset:hover{border-color:var(–mid);color:var(–white);}

/* RACKET LIST */
.racket-list{display:flex;flex-direction:column;gap:0.75rem;}
.racket-item{background:var(–card-bg);border:1px solid var(–card-border);border-radius:12px;display:flex;align-items:center;gap:1rem;padding:0.9rem 1.1rem;transition:border-color 0.2s;}
.racket-item:hover{border-color:var(–gold-border);}
.drag-handle{color:var(–mid);cursor:grab;font-size:1.1rem;flex-shrink:0;user-select:none;}
.drag-handle:active{cursor:grabbing;}
.racket-thumb{width:64px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.racket-info{flex:1;min-width:0;}
.racket-name{font-family:‘Playfair Display’,serif;font-size:1rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.racket-meta{font-family:‘DM Mono’,monospace;font-size:0.65rem;color:var(–mid);letter-spacing:0.1em;margin-top:0.2rem;}
.racket-tag{font-family:‘DM Mono’,monospace;font-size:0.6rem;letter-spacing:0.15em;background:var(–gold-dim);border:1px solid var(–gold-border);color:var(–gold);padding:0.15rem 0.55rem;border-radius:50px;white-space:nowrap;}
.racket-item-actions{display:flex;gap:0.5rem;flex-shrink:0;}
.btn-edit{background:transparent;border:1px solid var(–card-border);border-radius:7px;padding:0.4rem 0.8rem;color:var(–mid);font-size:0.78rem;font-family:‘Inter’,sans-serif;cursor:pointer;transition:all 0.2s;}
.btn-edit:hover{border-color:var(–gold-border);color:var(–gold);}
.btn-del{background:transparent;border:1px solid var(–card-border);border-radius:7px;padding:0.4rem 0.8rem;color:var(–mid);font-size:0.78rem;font-family:‘Inter’,sans-serif;cursor:pointer;transition:all 0.2s;}
.btn-del:hover{border-color:var(–danger);color:var(–danger);}

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(–success);color:#fff;font-family:‘Inter’,sans-serif;font-size:0.88rem;font-weight:600;padding:0.75rem 1.5rem;border-radius:50px;box-shadow:0 8px 24px rgba(0,0,0,0.4);transition:transform 0.35s;z-index:500;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:var(–danger);}

/* CONFIRM DIALOG */
.confirm-overlay{display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:1rem;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:var(–card-bg);border:1px solid var(–gold-border);border-radius:16px;padding:2rem;max-width:340px;width:100%;text-align:center;}
.confirm-title{font-family:‘Playfair Display’,serif;font-size:1.2rem;font-weight:700;margin-bottom:0.6rem;}
.confirm-msg{font-size:0.85rem;color:var(–mid);line-height:1.6;margin-bottom:1.5rem;}
.confirm-actions{display:flex;gap:0.75rem;}
.btn-confirm-yes{flex:1;background:var(–danger);border:none;border-radius:9px;padding:0.7rem;color:#fff;font-family:‘Inter’,sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn-confirm-yes:hover{background:#c44;}
.btn-confirm-no{flex:1;background:transparent;border:1px solid var(–card-border);border-radius:9px;padding:0.7rem;color:var(–mid);font-family:‘Inter’,sans-serif;font-size:0.9rem;cursor:pointer;transition:all 0.2s;}
.btn-confirm-no:hover{border-color:var(–mid);color:var(–white);}

@media(max-width:640px){
.admin-main{padding:1.5rem 1rem;}
.form-grid{grid-template-columns:1fr;}
.admin-header{padding:0 1rem;}
.racket-item{flex-wrap:wrap;}
}
</style>

</head>

const DEFAULT_TAGS = ['All','Intermediate','Advanced','Pro'];

// ── STATE ──
let RACKETS = [];
let TAGS = [];
let currentImg = null;
let editingId = null;
let dragSrcEl = null;

// ── AUTH ──
function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PW) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminWrap').classList.add('show');
    init();
  } else {
    document.getElementById('loginError').classList.add('show');
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
}
function checkAuth() {
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminWrap').classList.add('show');
    init();
  }
}

// ── DATA ──
function loadRackets() {
  try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_RACKETS)); } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_RACKETS)); }
}
function loadTags() {
  try { const s = localStorage.getItem(TAGS_KEY); return s ? JSON.parse(s) : [...DEFAULT_TAGS]; } catch(e) { return [...DEFAULT_TAGS]; }
}
function saveRackets() { localStorage.setItem(STORAGE_KEY, JSON.stringify(RACKETS)); }
function saveTags() { localStorage.setItem(TAGS_KEY, JSON.stringify(TAGS)); }

// ── TAGS ──
function renderTags() {
  const list = document.getElementById('tagsList');
  list.innerHTML = '';
  TAGS.forEach((tag, i) => {
    const el = document.createElement('div');
    el.className = 'tag-item' + (tag === 'All' ? ' default' : '');
    el.innerHTML = `<span>${tag}</span>${tag !== 'All' ? `<button class="tag-del" onclick="deleteTag(${i})">×</button>` : ''}`;
    list.appendChild(el);
  });
  // Update tag selects
  const sel = document.getElementById('fTag');
  const cur = sel.value;
  sel.innerHTML = TAGS.filter(t => t !== 'All').map(t => `<option value="${t}">${t}</option>`).join('');
  if (cur) sel.value = cur;
}
function addTag() {
  const inp = document.getElementById('newTagInput');
  const val = inp.value.trim();
  if (!val || TAGS.includes(val)) { showToast('Tag already exists or empty','error'); return; }
  TAGS.push(val); saveTags(); renderTags(); inp.value = '';
  showToast('Tag added ✓');
}
function deleteTag(i) {
  const tag = TAGS[i];
  if (RACKETS.some(r => r.tag === tag)) { showToast('Cannot delete — rackets are using this tag','error'); return; }
  TAGS.splice(i, 1); saveTags(); renderTags();
  showToast('Tag removed');
}

// ── RACKET LIST ──
function renderList() {
  const list = document.getElementById('racketList');
  list.innerHTML = '';
  document.getElementById('racketCount').textContent = RACKETS.length + ' total';
  const sorted = [...RACKETS].sort((a,b) => (a.order||0)-(b.order||0));
  sorted.forEach(r => {
    const el = document.createElement('div');
    el.className = 'racket-item'; el.draggable = true; el.dataset.id = r.id;
    el.innerHTML = `
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <img class="racket-thumb" src="${r.image}" alt="${r.name}">
      <div class="racket-info">
        <div class="racket-name">${r.brand} ${r.name}</div>
        <div class="racket-meta">${r.specs.join(' · ')}</div>
      </div>
      <span class="racket-tag">${r.tag}</span>
      <div class="racket-item-actions">
        <button class="btn-edit" onclick="editRacket(${r.id})">Edit</button>
        <button class="btn-del" onclick="confirmDelete(${r.id})">Delete</button>
      </div>`;
    // Drag events
    el.addEventListener('dragstart', e => { dragSrcEl = el; e.dataTransfer.effectAllowed = 'move'; el.style.opacity='0.4'; });
    el.addEventListener('dragend', e => { el.style.opacity='1'; list.querySelectorAll('.racket-item').forEach(i=>i.classList.remove('drag-over')); });
    el.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault(); el.classList.remove('drag-over');
      if (dragSrcEl === el) return;
      const ids = [...list.querySelectorAll('.racket-item')].map(i => parseInt(i.dataset.id));
      const fromIdx = ids.indexOf(parseInt(dragSrcEl.dataset.id));
      const toIdx   = ids.indexOf(parseInt(el.dataset.id));
      ids.splice(toIdx, 0, ids.splice(fromIdx, 1)[0]);
      ids.forEach((id, order) => { const r = RACKETS.find(x=>x.id===id); if(r) r.order = order; });
      saveRackets(); renderList();
      showToast('Order updated ✓');
    });
    list.appendChild(el);
  });
}

// ── FORM ──
function handleImg(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 5*1024*1024) { showToast('Image too large (max 5MB)','error'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    // Resize image
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 900;
      let w = img.width, h = img.height;
      if (w > max || h > max) { if (w > h) { h = h*max/w; w = max; } else { w = w*max/h; h = max; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      currentImg = canvas.toDataURL('image/jpeg', 0.78);
      document.getElementById('imgPreview').src = currentImg;
      document.getElementById('imgPreview').style.display = 'block';
      document.getElementById('imgPlaceholder').style.display = 'none';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
function dragOver(e) { e.preventDefault(); document.getElementById('uploadArea').classList.add('drag'); }
function dragLeave() { document.getElementById('uploadArea').classList.remove('drag'); }
function dropFile(e) { e.preventDefault(); dragLeave(); const f = e.dataTransfer.files[0]; if(f) { const inp = document.querySelector('#uploadArea input'); const dt = new DataTransfer(); dt.items.add(f); inp.files = dt.files; handleImg({target:inp}); } }

function submitRacket() {
  const brand = document.getElementById('fBrand').value.trim();
  const name  = document.getElementById('fName').value.trim();
  const tag   = document.getElementById('fTag').value;
  const badge = document.getElementById('fBadge').value.trim();
  const specs = document.getElementById('fSpecs').value.split(',').map(s=>s.trim()).filter(Boolean);
  const desc  = document.getElementById('fDesc').value.trim();
  if (!brand || !name || !desc) { showToast('Please fill in Brand, Name, and Description','error'); return; }
  if (editingId !== null) {
    const r = RACKETS.find(x => x.id === editingId);
    if (r) {
      r.brand=brand; r.name=name; r.tag=tag; r.badge=badge; r.specs=specs; r.desc=desc;
      r.wa=`Hi, I'm interested in the ${brand} ${name}. Could you share more details?`;
      if (currentImg) r.image = currentImg;
    }
    showToast('Racket updated ✓');
  } else {
    const img = currentImg || '';
    if (!img) { showToast('Please upload a photo','error'); return; }
    const newId = Date.now();
    RACKETS.push({ id:newId, brand, name, tag, badge, specs, desc, image:img,
      wa:`Hi, I'm interested in the ${brand} ${name}. Could you share more details?`,
      order: RACKETS.length });
    showToast('Racket added ✓');
  }
  saveRackets(); renderList(); resetForm();
}

function editRacket(id) {
  const r = RACKETS.find(x=>x.id===id); if(!r) return;
  editingId = id;
  document.getElementById('fBrand').value = r.brand;
  document.getElementById('fName').value  = r.name;
  document.getElementById('fTag').value   = r.tag;
  document.getElementById('fBadge').value = r.badge||'';
  document.getElementById('fSpecs').value = r.specs.join(', ');
  document.getElementById('fDesc').value  = r.desc;
  document.getElementById('imgPreview').src = r.image;
  document.getElementById('imgPreview').style.display = 'block';
  document.getElementById('imgPlaceholder').style.display = 'none';
  currentImg = null;
  document.getElementById('formTitle').innerHTML = 'Edit Racket <span>Editing</span>';
  document.querySelector('.btn-submit').textContent = 'Update Racket';
  document.querySelector('.admin-main').scrollTop = 0;
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetForm() {
  editingId = null; currentImg = null;
  ['fBrand','fName','fBadge','fSpecs','fDesc'].forEach(id => document.getElementById(id).value='');
  document.getElementById('imgPreview').style.display='none';
  document.getElementById('imgPlaceholder').style.display='flex';
  document.getElementById('formTitle').innerHTML = 'Add Racket <span>New</span>';
  document.querySelector('.btn-submit').textContent = 'Save Racket';
}

// ── DELETE ──
let pendingDeleteId = null;
function confirmDelete(id) {
  pendingDeleteId = id;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() {
  pendingDeleteId = null;
  document.getElementById('confirmOverlay').classList.remove('open');
}
document.getElementById('confirmYesBtn').onclick = () => {
  if (pendingDeleteId !== null) {
    RACKETS = RACKETS.filter(r => r.id !== pendingDeleteId);
    saveRackets(); renderList(); closeConfirm();
    showToast('Racket deleted');
  }
};

// ── TOAST ──
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type==='error'?' error':'');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── INIT ──
function init() {
  RACKETS = loadRackets(); TAGS = loadTags();
  renderTags(); renderList();
}
checkAuth();
</script>
